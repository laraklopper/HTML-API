<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITY DETAILS API</title>
    <link rel="stylesheet" href="./style.css"/>
    <!-- Bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@400..700&family=Playpen+Sans:wght@100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<!-- Body -->
<body id="body">
    <!-- BOOTSTRAP CONTAINER -->
    <div class="container-fluid" role="main" aria-label="City Details API Application">
        <!-- HEADER -->
        <header id="header" role="banner" aria-labelledby="pageTitle">
            <div class="row justify-content-center" id="headerRow">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6" id="headingCol">
                    <h1 class="h1" id="pageTitle">CITY DETAIL API</h1>
                </div>
            </div>
        </header>
    <!-- SECTION 1: API OUTPUT -->
        <section id="section1" aria-label="City API Output">
            <div class="row justify-content-center" id="outputRow">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6" id="outputCol">
                    <!-- Screen reader heading -->
                    <h2 class="visually-hidden" id="outputHeading">City Information Results</h2>
                    <!-- API OUTPUT BLOCK -->
                    <div
                        id="output"
                        role="region"
                        aria-labelledby="outputHeading"
                        aria-live="polite"
                        aria-atomic="true"
                        >
                    <!-- API OUTPUT -->
                    </div>
                </div>
            </div>
        </section>
    </div>
    <!-- JavaScript -->
    <script src="./script.js"></script>
</body>
</html>
